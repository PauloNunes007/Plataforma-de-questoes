<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questly — Ranking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FFFFFF;
  --bg-soft:#F7FAF7;
  --bg-page:#FAFBFA;
  --green:#2FC44C;
  --green-dark:#249A3B;
  --green-light:#DFF7E3;
  --blue:#1CB0F6;
  --blue-dark:#1590CC;
  --blue-light:#DFF3FE;
  --orange:#FF9600;
  --orange-dark:#DB7E00;
  --orange-light:#FFEBCC;
  --red:#FF4B4B;
  --red-dark:#D93A3A;
  --red-light:#FFE3E3;
  --gold:#FFC800;
  --text:#3C3C41;
  --text-dim:#767680;
  --text-soft:#9C9CA6;
  --border:#E7E7EC;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{ font-family:'Nunito',sans-serif; color:var(--text); background:var(--bg-page); }
h1,h2,h3,h4{font-family:'Fredoka',sans-serif; font-weight:600; letter-spacing:-0.01em; color:#2B2B30;}
a{color:inherit; text-decoration:none;}
button{font-family:inherit; cursor:pointer; border:none;}
.mono{font-family:'JetBrains Mono',monospace;}

.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  font-family:'Fredoka'; font-weight:600; font-size:14px;
  padding:12px 20px; border-radius:13px; border-bottom:4px solid transparent;
  transition:transform .08s ease;
}
.btn:active{ transform:translateY(3px); border-bottom-width:0; }
.btn-primary{ background:var(--green); color:#fff; border-bottom-color:var(--green-dark); }

.shell{ display:grid; grid-template-columns:236px 1fr; min-height:100vh; }

/* sidebar (mesma das outras telas) */
.sidebar{ background:#fff; border-right:1px solid var(--border); padding:24px 16px; display:flex; flex-direction:column; }
.logo{ display:flex; align-items:center; gap:9px; font-family:'Fredoka'; font-weight:700; font-size:19px; padding:8px 10px 26px; }
.logo-mark{ width:30px; height:30px; border-radius:10px; background:var(--green); display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; color:#fff;}
.side-link{ display:flex; align-items:center; gap:11px; padding:11px 13px; border-radius:12px; color:var(--text-dim); font-size:14px; font-weight:700; margin-bottom:3px;}
.side-link.active{ background:var(--green-light); color:var(--green-dark); }
.side-link .ic{ width:18px; height:18px; }
.side-user{ margin-top:auto; display:flex; align-items:center; gap:10px; padding:12px 10px; border-top:1px solid var(--border); }
.avatar{ width:36px; height:36px; border-radius:11px; background:var(--green); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:#fff; overflow:hidden;}
.avatar-img{ width:100%; height:100%; object-fit:cover; }

/* main */
.main{ padding:30px 36px 60px; max-width:640px; width:100%; margin:0 auto; }
.main-head{ margin-bottom:22px; }
.main-head h1{ font-size:25px; }
.main-head p{ color:var(--text-dim); font-size:13.5px; font-weight:600; margin-top:4px;}

.card{ background:#fff; border:1px solid var(--border); border-radius:20px; padding:24px; margin-bottom:20px; }
.chip-row{ display:flex; flex-wrap:wrap; gap:9px; }
.chip{ padding:9px 15px; border-radius:100px; border:2px solid var(--border); background:#fff; font-size:13px; font-weight:700; color:var(--text-dim); }
.empty-hint{ font-size:13px; color:var(--text-soft); font-weight:600; padding:8px 0; }
.disc-label{ font-size:11.5px; font-weight:800; color:var(--text-soft); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:8px;}

/* cabeçalho da liga */
.liga-header{ text-align:center; }
.liga-head-icon{ font-size:52px; line-height:1; margin-bottom:6px; }
.liga-header h2{ font-size:22px; }
.liga-header .sub{ font-size:12.5px; color:var(--text-soft); font-weight:700; margin-top:2px; margin-bottom:20px;}
.liga-ribbon{ display:flex; justify-content:center; gap:8px; flex-wrap:wrap; }
.liga-pill{
  display:flex; align-items:center; gap:6px; padding:8px 13px; border-radius:100px;
  background:var(--bg-soft); border:2px solid var(--border); font-size:12px; font-weight:800; color:var(--text-soft);
}
.liga-pill span{ font-size:15px; }
.liga-pill.current{ background:var(--gold); border-color:#E0A500; color:#7A5200; }

/* lista do ranking */
.rank-hint{ font-size:12.5px; color:var(--text-soft); font-weight:700; margin-bottom:12px; text-align:center; }
.rank-list{ display:flex; flex-direction:column; gap:8px; }
.rank-row{
  display:flex; align-items:center; gap:13px; padding:11px 14px; border-radius:15px;
  border:2px solid transparent; cursor:pointer; transition:background .12s, border-color .12s;
}
.rank-row:hover{ background:var(--bg-soft); }
.rank-row.me{ background:var(--blue-light); border-color:#B8E4FB; }
.rank-row.zone-up{ background:var(--green-light); }
.rank-row.zone-up:hover{ background:#CDF0D4; }
.rank-row.zone-down{ background:var(--red-light); }
.rank-row.zone-down:hover{ background:#FFD4D4; }
.rank-num{ width:28px; text-align:center; font-family:'Fredoka'; font-weight:600; font-size:16px; color:var(--text-soft); flex-shrink:0; }
.rank-avatar{
  width:38px; height:38px; border-radius:12px; background:var(--green); flex-shrink:0; overflow:hidden;
  display:flex; align-items:center; justify-content:center; font-family:'Fredoka'; font-weight:700; font-size:14px; color:#fff;
}
.rank-info{ flex:1; min-width:0; }
.rank-info b{ font-size:13.5px; font-weight:800; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rank-info span{ font-size:11px; color:var(--text-soft); font-weight:700; }
.rank-xp{ font-family:'JetBrains Mono'; font-weight:700; font-size:14px; color:var(--green-dark); flex-shrink:0; }
.rank-xp small{ font-size:10px; font-weight:700; color:var(--text-soft); }

/* modal do card público */
.modal-overlay{
  display:none; position:fixed; inset:0; background:rgba(30,35,30,0.45); z-index:200;
  align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.show{ display:flex; }
.modal-card{ position:relative; background:#fff; border-radius:22px; padding:32px 26px 26px; max-width:340px; width:100%; text-align:center; }
.modal-close{ position:absolute; top:14px; right:16px; font-size:20px; color:var(--text-soft); font-weight:700; }
.uc-avatar{
  width:78px; height:78px; border-radius:24px; background:var(--green); margin:0 auto 14px; overflow:hidden;
  display:flex; align-items:center; justify-content:center; font-family:'Fredoka'; font-weight:700; font-size:30px; color:#fff;
}
.uc-sub{ font-size:12.5px; color:var(--text-soft); font-weight:700; margin-top:2px; }
.uc-liga{
  display:inline-flex; align-items:center; gap:6px; margin-top:14px; padding:8px 15px; border-radius:100px;
  background:var(--gold-light,#FFF6D6); font-size:12.5px; font-weight:800; color:#7A5200;
}
.modal-card .chip-row{ justify-content:center; }

@media(max-width:720px){
  .shell{ grid-template-columns:1fr; }
  .sidebar{ display:none; }
}
</style>
</head>
<body>

<div class="shell">
  <aside class="sidebar">
    <div class="logo"><div class="logo-mark">Q</div>Questly</div>
    <a class="side-link" href="questly_dashboard.html"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg> Início</a>
    <a class="side-link" href="questly_disciplinas.html"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/></svg> Disciplinas</a>
    <a class="side-link" href="questly_trilha.html"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19h16M4 5h16M8 5v14M16 5v14"/></svg> Minha trilha</a>
    <a class="side-link active" href="questly_ranking.html"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10M18 20V4M6 20v-6"/></svg> Ranking</a>
    <a class="side-link"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg> Calendário</a>
    <a class="side-link" href="questly_configuracoes.html"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg> Perfil</a>
    <div class="side-user">
      <div class="avatar" id="sideAvatar">?</div>
      <div><div style="font-size:13px;font-weight:700;" id="sideName">Carregando...</div><div style="font-size:11px;color:var(--text-soft);font-weight:700;" id="sideCourse"></div></div>
    </div>
  </aside>

  <main class="main">
    <div class="main-head">
      <h1>Ranking</h1>
      <p>Sua liga da semana. Suba de liga terminando entre os melhores, sem cair pros últimos.</p>
    </div>

    <div class="card liga-header">
      <div class="liga-head-icon" id="ligaHeadIcon">🥉</div>
      <h2 id="ligaHeadNome">Liga Bronze</h2>
      <div class="sub" id="ligaHeadSub">Carregando...</div>
      <div class="liga-ribbon" id="ligaRibbon"></div>
    </div>

    <div class="card">
      <p class="rank-hint" id="rankHint"></p>
      <div class="rank-list" id="rankList">
        <div class="empty-hint">Carregando ranking...</div>
      </div>
    </div>
  </main>
</div>

<!-- card público do aluno -->
<div class="modal-overlay" id="userCardOverlay">
  <div class="modal-card">
    <button class="modal-close" id="userCardClose">×</button>
    <div id="userCardContent"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/liga.js"></script>
<script src="js/ranking.js"></script>
</body>
</html>
